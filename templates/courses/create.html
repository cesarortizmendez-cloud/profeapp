{% extends "base.html" %}
{% block title %}Nuevo Curso – ProfeApp{% endblock %}
{% block page_title %}Nuevo Curso{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="pa-card">
      <div class="pa-card-header">
        <i class="bi bi-book-fill text-primary"></i>
        <h6>Crear nuevo curso</h6>
      </div>
      <div class="pa-card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-bold">Nombre del curso *</label>
              <input type="text" name="name" class="form-control" placeholder="Ej: Cálculo I, Programación Avanzada" required>
            </div>
            <div class="col-6">
              <label class="form-label fw-bold">Código</label>
              <input type="text" name="code" class="form-control" placeholder="Ej: MAT101">
            </div>
            <div class="col-6">
              <label class="form-label fw-bold">Sección</label>
              <input type="text" name="section" class="form-control" placeholder="Ej: A, 01">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Universidad / Institución</label>
              <select name="university" class="form-select">
                <option value="">— Sin especificar —</option>
                {% for uni in universities %}
                <option value="{{ uni.pk }}">{{ uni.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-bold">Año *</label>
              <input type="number" name="year" class="form-control" value="{{ current_year }}" min="2020" max="2035" required>
            </div>
            <div class="col-6">
              <label class="form-label fw-bold">Período *</label>
              <select name="semester" class="form-select" required>
                <option value="1">Primer Semestre</option>
                <option value="2">Segundo Semestre</option>
                <option value="3">Anual</option>
                <option value="4">Verano</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Descripción</label>
              <textarea name="description" class="form-control" rows="3" placeholder="Descripción breve del curso (opcional)"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Color identificador</label>
              <div class="d-flex align-items-center gap-3">
                <input type="color" name="color" class="form-control form-control-color" value="#4361ee" style="width:60px; height:40px; padding:2px; border-radius:8px;">
                <span class="text-muted" style="font-size:.82rem;">Elige un color para identificar visualmente el curso</span>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-pa">
              <i class="bi bi-check-lg me-1"></i>Crear curso
            </button>
            <a href="{% url 'dashboard:home' %}" class="btn btn-outline-secondary" style="border-radius:8px;">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
